<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <defs>
    <radialGradient id="ocean" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="55%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <radialGradient id="shine" cx="40%" cy="32%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </linearGradient>
    <clipPath id="gc">
      <circle cx="50" cy="47" r="26"/>
    </clipPath>
  </defs>

  <!-- Bag handles (drawn behind globe) -->
  <path d="M 10 66 Q 10 45 16 45 Q 22 45 22 66"
        fill="none" stroke="#0A0F1E" stroke-width="5" stroke-linecap="round"/>
  <path d="M 78 66 Q 78 45 84 45 Q 90 45 90 66"
        fill="none" stroke="#0A0F1E" stroke-width="5" stroke-linecap="round"/>

  <!-- Globe: ocean base -->
  <circle cx="50" cy="47" r="26" fill="url(#ocean)"/>

  <!-- Continents (clipped to globe) -->
  <g clip-path="url(#gc)">
    <!-- Greenland -->
    <path d="M 43 16 Q 50 14 54 18 Q 55 23 52 27 Q 48 28 44 25 Q 42 21 43 16 Z"
          fill="#80CBC4"/>
    <!-- Americas -->
    <path d="M 32 28 Q 27 38 28 47 Q 30 58 33 65 Q 36 70 37 68
             Q 38 60 36 54 Q 34 48 35 43 Q 37 37 40 34 Q 38 30 34 28 Z"
          fill="#43A047"/>
    <!-- South America -->
    <path d="M 35 65 Q 33 72 34 78 Q 36 83 38 82 Q 40 77 39 72 Q 38 67 35 65 Z"
          fill="#2E7D32"/>
    <!-- Europe -->
    <path d="M 51 24 Q 57 25 59 31 Q 60 37 57 41 Q 54 42 51 40
             Q 48 37 49 31 Q 50 26 51 24 Z"
          fill="#A5D6A7"/>
    <!-- Africa -->
    <path d="M 53 40 Q 59 43 60 51 Q 61 60 58 66 Q 56 70 53 72
             Q 51 68 51 61 Q 50 54 51 48 Q 51 44 53 40 Z"
          fill="#66BB6A"/>
    <!-- Asia -->
    <path d="M 61 26 Q 69 24 74 31 Q 77 38 74 45 Q 70 50 64 49
             Q 58 47 57 41 Q 57 33 61 26 Z"
          fill="#AED581"/>
    <!-- Australia -->
    <path d="M 70 55 Q 77 53 80 60 Q 80 67 76 70 Q 72 71 69 67 Q 67 61 69 56 Z"
          fill="#FFF176"/>
  </g>

  <!-- Grid lines (latitude + longitude, clipped to globe) -->
  <g clip-path="url(#gc)" fill="none" stroke="rgba(255,255,255,0.22)">
    <line x1="24" y1="47" x2="76" y2="47" stroke-width="0.9"/>
    <line x1="24" y1="38" x2="76" y2="38" stroke-width="0.55"/>
    <line x1="24" y1="56" x2="76" y2="56" stroke-width="0.55"/>
    <line x1="50" y1="21" x2="50" y2="73" stroke-width="0.9"/>
    <ellipse cx="50" cy="47" rx="13" ry="26" stroke-width="0.55"/>
    <ellipse cx="50" cy="47" rx="23" ry="26" stroke-width="0.55"/>
  </g>

  <!-- Globe shine -->
  <circle cx="50" cy="47" r="26" fill="url(#shine)"/>

  <!-- Globe outline -->
  <circle cx="50" cy="47" r="26" fill="none" stroke="rgba(13,71,161,0.55)" stroke-width="1.2"/>

  <!-- Bag body (covers globe bottom → "sitting in bag" effect) -->
  <rect x="8" y="64" width="84" height="43" rx="6" fill="url(#bagGrad)"/>

  <!-- Subtle center crease on bag -->
  <line x1="50" y1="64" x2="50" y2="107" stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
</svg>

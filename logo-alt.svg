<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1C2E52"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </radialGradient>
  </defs>

  <!-- Dark navy background circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Signal arcs radiating from icon tip (~64,36) toward top-right -->
  <g fill="none" stroke="#4F8EF7" stroke-linecap="round">
    <path d="M 64 28 A 8 8 0 0 1 72 36" stroke-width="1.8" opacity="0.9"/>
    <path d="M 64 22 A 14 14 0 0 1 78 36" stroke-width="1.3" opacity="0.55"/>
    <path d="M 64 16 A 20 20 0 0 1 84 36" stroke-width="1" opacity="0.28"/>
  </g>

  <!-- Paper airplane with electric glow -->
  <g transform="translate(50,50) rotate(-45) scale(2.1) translate(-12,-12)"
     fill="none" stroke="#4F8EF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     filter="url(#glow)">
    <path d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/>
  </g>
</svg>

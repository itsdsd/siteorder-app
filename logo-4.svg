<!-- Option 4: Square, plane top-right, zoomed in -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#4F8EF7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(10,15,30,0.4)"/>
    </filter>
    <clipPath id="sq">
      <rect x="4" y="4" width="92" height="92" rx="20"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#sq)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" fill="none">
    <line x1="0" y1="25" x2="100" y2="25"/>
    <line x1="0" y1="50" x2="100" y2="50"/>
    <line x1="0" y1="75" x2="100" y2="75"/>
    <line x1="25" y1="0" x2="25" y2="100"/>
    <line x1="50" y1="0" x2="50" y2="100"/>
    <line x1="75" y1="0" x2="75" y2="100"/>
  </g>

  <!-- Dot trail bottom-left → plane -->
  <g fill="rgba(255,255,255,0.38)">
    <circle cx="18" cy="78" r="1.2"/>
    <circle cx="27" cy="69" r="1.6"/>
    <circle cx="36" cy="60" r="2"/>
    <circle cx="44" cy="52" r="2.4"/>
  </g>

  <!-- Paper airplane — top-right, zoomed in -->
  <g transform="translate(57,43) rotate(-45) scale(2.5) translate(-12,-12)"
     fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/>
  </g>
</svg>
